defaults:
  - /dataset: active_matter
  - /model: conv_small
  - /ft: linear
  - _self_

dataset:
  num_frames: 16
  target_offsets: [1]

model:
  objective: "jepa"
  loss: "mse"
  channel_wise_encoding: false
  dims: [16, 32, 64, 128, 128]
  num_res_blocks: [3, 3, 3, 9, 3]

train:
  num_epochs: 20
  batch_size: 8
  report_every: 100
  save_every: 1
  include_labels: false
  target_encoder_mode: "ema"
  target_ema_momentum: 0.996
  target_offset_weights: null
  horizon_specific_predictors: false
  predict_n_steps: false
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 1e-6
  lr: 5e-4
  weight_decay: 0.05
  noise_std: 1.0
  distributed: true
  run_name: "ijepa_ema_mse"

ft:
  task: "regression"
  use_attentive_pooling: true
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 0
  lr: 1e-3
  weight_decay: 0.01
  noise_std: 1.0
  run_name: "activematter-jepa-FT-noise-std-1.0"
  distributed: false

out_path: "./checkpoints/ijepa_ema_mse"
cache_path: "./dataset_cache"
